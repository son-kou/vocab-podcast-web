<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Vocab Podcast Web</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <h1 style="margin:0">丹麦语学习</h1>
        <p style="margin:2px 0 0;color:#657078;font-size:13px">Podcast · Reading · Vocab</p>
      </div>
      <button id="loginBtn" style="font-size:12px;padding:5px 14px">Login</button>
    </header>
    <nav class="tabs" style="margin: 12px 0">
      <button id="tabPodcast" class="tab active">Podcast</button>
      <button id="tabReading" class="tab">Reading</button>
    </nav>
    <main>
      <!-- uploader is hidden in UI; corpus is synced via the CLI. -->
      <section id="uploader" class="hidden">
        <div
          style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap"
        >
          <label
            >Episode:
            <select id="episodeSelect"></select
          ></label>
          <button id="loadEpisode">Load episode</button>
          <label
            >Audio file: <input type="file" id="audioInput" accept="audio/*"
          /></label>
          <label
            >Transcript (WebVTT or plain text):
            <input type="file" id="transcriptInput" accept="text/*"
          /></label>
          <button id="loadSample">Load sample</button>
        </div>
      </section>

      <section id="player" class="hidden">
        <audio id="audio" controls crossorigin="anonymous"></audio>
        <div id="controls">
          <label
            >Speed:
            <select id="speed">
              <option>0.75</option>
              <option selected>1</option>
              <option>1.25</option>
              <option>1.5</option>
              <option>2</option>
            </select></label
          >
          <div
            id="ttsControls"
            style="
              display: inline-flex;
              gap: 8px;
              align-items: center;
              margin-left: 12px;
            "
          >
            <label
              >Use TTS: <input type="checkbox" id="useTTS" checked
            /></label>
            <button id="ttsSpeak">Speak current sentence</button>
            <label>Auto TTS: <input type="checkbox" id="ttsAuto" /></label>
          </div>
        </div>
        <div id="transcriptContainer"></div>
      </section>

      <section id="vocabPanel">
        <h2>Vocab</h2>
        <div id="vocabStats">No vocab loaded.</div>
        <div id="vocabList"></div>
        <div
          style="margin-top: 8px; display: flex; gap: 8px; align-items: center"
        >
          <button id="exportAnki" class="auth-required">Export selected to Anki TSV</button>
          <button id="exportSelectedFull" class="auth-required">
            Export selection for full Anki (lemmas)
          </button>
          <button id="showFlagged" class="auth-required">Review flagged entries</button>
        </div>
        <div
          id="flaggedPanel"
          class="hidden"
          style="
            margin-top: 10px;
            border: 1px solid #eee;
            padding: 8px;
            border-radius: 6px;
            max-height: 260px;
            overflow: auto;
          "
        ></div>
      </section>

      <!-- Reading tab -->
      <section id="readingSection" class="hidden">
        <div class="reading-layout">
          <!-- Left sidebar: article tree -->
          <aside id="articleTree">
            <div class="tree-header">
              <span>文章</span>
              <button id="newArticleBtn" class="auth-required tree-new-btn" title="新建文章">＋</button>
            </div>
            <div id="articleList"></div>
          </aside>
          <!-- Right: composer / viewer -->
          <div class="reading-main">
            <!-- Placeholder when nothing is open -->
            <div id="readingPlaceholder" class="reading-placeholder">
              <p>从左侧选择文章，或点击 ＋ 新建</p>
            </div>
            <!-- Composer: new article form -->
            <div id="articleComposer" class="hidden">
              <input id="articleTitleInput" class="article-title-input" placeholder="文章标题（可选）" />
              <textarea
                id="readingInput"
                placeholder="粘贴文章内容…"
                rows="16"
              ></textarea>
              <div class="composer-actions">
                <button id="saveArticle" class="auth-required">保存文章</button>
                <button id="clearArticle">清空</button>
                <button id="cancelCompose">取消</button>
              </div>
            </div>
            <!-- Viewer: renders saved article -->
            <div id="readingViewer" class="hidden">
              <h3 id="readingTitle" class="reading-article-title"></h3>
              <div id="readingPreview"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <template id="sentenceTemplate"
      ><div class="sentence" data-start="" data-end="">
        <span class="text"></span></div
    ></template>

    <script src="app.js"></script>
  </body>
</html>
